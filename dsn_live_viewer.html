    <title>DSN Live 3D - OBJ Earth</title>

        html, body { overscroll-behavior: none; }

        .status-box { background: rgba(0, 15, 0, 0.9); border: 1px solid #0f0; padding: 15px; width: min(520px, calc(100vw - 40px)); pointer-events: auto; max-height: calc(100vh - 40px); overflow: hidden; display: flex; flex-direction: column; }
        #sidebar-scroll { margin-top: 10px; overflow-y: auto; overflow-x: hidden; min-height: 0; flex: 1 1 auto; padding-right: 6px; touch-action: pan-y; -webkit-overflow-scrolling: touch; }
        #log { font-size: 14px; color: #0ff; overflow: visible; }
        #details { font-size: 14px; line-height: 1.45; color: #9ff; margin-top: 14px; min-height: 120px; border-top: 1px solid rgba(0,255,0,0.25); padding-top: 12px; }
        h1 { margin: 0; font-size: 16px; border-bottom: 1px solid #0f0; }
        .conn-item { display: block; width: 100%; box-sizing: border-box; margin: 0 0 8px; padding: 10px 12px; border: 1px solid rgba(0,255,255,0.3); background: rgba(0,40,50,0.35); color: #bff; text-align: left; cursor: pointer; font: inherit; line-height: 1.35; }
        .conn-item:hover { border-color: #0ff; background: rgba(0,60,70,0.45); }
        .conn-item.active { border-color: #fff; background: rgba(255,255,255,0.14); color: #fff; }
        .conn-item strong { color: inherit; }
        .detail-label { color: #6fd; }
        .detail-title { font-size: 18px; color: #fff; margin-bottom: 6px; }
        .detail-blurb { margin-top: 10px; color: #d8ffff; }
        #ephemeris-legend { display: none; }
        #tools { position: absolute; right: 20px; bottom: 20px; z-index: 12; display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; pointer-events: auto; max-width: min(520px, calc(100vw - 40px)); }
        .tool-btn { padding: 8px 10px; border: 1px solid rgba(0,255,255,0.45); background: rgba(0,40,50,0.45); color: #dff; cursor: pointer; font: inherit; }
        .tool-btn:hover { border-color: #fff; background: rgba(255,255,255,0.12); }
        .tool-btn.active { border-color: #fff; background: rgba(255,255,255,0.16); color: #fff; }
        #site-popup { position: absolute; z-index: 11; min-width: 260px; max-width: min(420px, calc(100vw - 40px)); padding: 12px 14px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0, 10, 18, 0.92); color: #dff; pointer-events: none; opacity: 0; transform: translateY(8px); transition: opacity 0.18s ease, transform 0.18s ease; }
        #site-popup.visible { opacity: 1; transform: translateY(0); }
        #site-popup-title { font-size: 18px; margin-bottom: 6px; }
        #site-popup-body { font-size: 13px; line-height: 1.45; }
        #body-popup { position: absolute; z-index: 11; min-width: 260px; max-width: min(420px, calc(100vw - 40px)); padding: 12px 14px; border: 1px solid rgba(255,255,255,0.2); background: rgba(8, 10, 24, 0.94); color: #dff; pointer-events: none; opacity: 0; transform: translateY(8px); transition: opacity 0.18s ease, transform 0.18s ease; }

        const EARTH_TEXTURE_ALIGNMENT = Math.PI;
        const EARTH_DIAMETER_KM = 12756;
        const SPEED_OF_LIGHT_KM_S = 299792.458;
        const KM_PER_SCENE_UNIT = EARTH_DIAMETER_KM / (EARTH_RADIUS * 2);
        const PULSE_SPEED_SCENE_UNITS_PER_SECOND = SPEED_OF_LIGHT_KM_S / KM_PER_SCENE_UNIT;

        controls.enablePan = false;
        controls.maxDistance = 72;
        const DEFAULT_CAMERA_POSITION = new THREE.Vector3(15, 10, 15);
        const DEFAULT_CAMERA_TARGET = new THREE.Vector3(0, 0, 0);
        camera.position.copy(DEFAULT_CAMERA_POSITION);
        controls.target.copy(DEFAULT_CAMERA_TARGET);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(10, 10, 10);
        scene.add(sun);

        const earthSystem = new THREE.Group();
        scene.add(earthSystem);
        const ephemerisGroup = new THREE.Group();
        scene.add(ephemerisGroup);
        const starfieldGroup = new THREE.Group();
        scene.add(starfieldGroup);
        const constellationGroup = new THREE.Group();
        scene.add(constellationGroup);

        const earthFrame = new THREE.Group();
        earthFrame.rotation.y = EARTH_TEXTURE_ALIGNMENT;
        earthSystem.add(earthFrame);

        const textureLoader = new THREE.TextureLoader();

        // --- CREATE EARTH ---
        let earth;
        const statusEl = document.getElementById('status');

        const objLoader = new OBJLoader();

        Promise.all([
            textureLoader.loadAsync('earth_diff.png'),
            objLoader.loadAsync('Earth_1_12756.obj')
        ]).then(([earthAtlasTexture, earthModel]) => {
            earthAtlasTexture.colorSpace = THREE.SRGBColorSpace;
            earthAtlasTexture.wrapS = THREE.ClampToEdgeWrapping;
            earthAtlasTexture.wrapT = THREE.ClampToEdgeWrapping;
            earthAtlasTexture.generateMipmaps = false;
            earthAtlasTexture.minFilter = THREE.LinearFilter;
            earthAtlasTexture.magFilter = THREE.LinearFilter;
            earthAtlasTexture.anisotropy = renderer.capabilities.getMaxAnisotropy();

            const earthMaterial = new THREE.MeshStandardMaterial({
                map: earthAtlasTexture,
                roughness: 1,
                metalness: 0
            });

            earthModel.traverse(child => {
                if (child.isMesh) {
                    child.material = earthMaterial;
                    child.castShadow = false;
                    child.receiveShadow = false;
                    child.geometry.computeVertexNormals();
                }
            });

            const box = new THREE.Box3().setFromObject(earthModel);
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z) || 1;
            const scale = (EARTH_RADIUS * 2) / maxDim;

            earthModel.scale.setScalar(scale);
            box.setFromObject(earthModel);
            const center = box.getCenter(new THREE.Vector3());
            earthModel.position.sub(center);
            earth = earthModel;
            earthFrame.add(earth);
            statusEl.innerText = "EARTH RENDERED. SYNCING DSN...";

        function latLonToVec3(lat, lon, r) {
            const latRad = THREE.MathUtils.degToRad(lat);
            const lonRad = THREE.MathUtils.degToRad(lon);
            const equator = Math.cos(latRad);
            return new THREE.Vector3(
                -r * equator * Math.sin(lonRad),
                r * Math.sin(latRad),
                -r * equator * Math.cos(lonRad)
            );
        }

        function createBeamRig(siteGroup, color, dataRate) {
            const azimuthPivot = new THREE.Group();
            siteGroup.add(azimuthPivot);

            const elevationPivot = new THREE.Group();
            azimuthPivot.add(elevationPivot);

            const beam = new THREE.Mesh(
                new THREE.CylinderGeometry(0.02, 0.02, BEAM_LEN, 8),
                new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.2 })
            );
            beam.geometry.translate(0, BEAM_LEN / 2, 0);
            beam.geometry.rotateX(Math.PI / 2);
            elevationPivot.add(beam);

            const beamPicker = new THREE.Mesh(
                new THREE.CylinderGeometry(0.18, 0.18, BEAM_LEN, 8),
                new THREE.MeshBasicMaterial({ transparent: true, opacity: 0, depthWrite: false })
            );
            beamPicker.geometry.translate(0, BEAM_LEN / 2, 0);
            beamPicker.geometry.rotateX(Math.PI / 2);
            elevationPivot.add(beamPicker);

            const normalizedRate = THREE.MathUtils.clamp(
                (Math.log10(Math.max(dataRate, 1)) - 2) / 6,
                0,
                1
            );
            const visualRate = Math.pow(normalizedRate, 0.8);

            return {
                azimuthPivot,
                elevationPivot,
                beam,
                beamPicker,
                color,
                dataRate,
                normalizedRate,
                visualRate,
                pulseAccumulator: 0,
                pulseInterval: THREE.MathUtils.lerp(4.5, 0.025, visualRate),
                pulseSpeed: PULSE_SPEED_SCENE_UNITS_PER_SECOND,
                pulseSize: THREE.MathUtils.lerp(0.045, 0.18, visualRate),
                pulseLength: THREE.MathUtils.lerp(0.5, 1.8, visualRate),
                baseBeamOpacity: THREE.MathUtils.lerp(0.12, 0.55, visualRate),
                emphasisScale: 1.35,
                connectionId: null,
                metadata: null
            };
        }

        function updateBeamRigRate(beamRig, dataRate) {
            beamRig.dataRate = dataRate;
            beamRig.normalizedRate = THREE.MathUtils.clamp(
                (Math.log10(Math.max(dataRate, 1)) - 2) / 6,
                0,
                1
            );
            beamRig.visualRate = Math.pow(beamRig.normalizedRate, 0.8);
            beamRig.pulseInterval = THREE.MathUtils.lerp(4.5, 0.025, beamRig.visualRate);
            beamRig.pulseSpeed = PULSE_SPEED_SCENE_UNITS_PER_SECOND;
            beamRig.pulseSize = THREE.MathUtils.lerp(0.045, 0.18, beamRig.visualRate);
            beamRig.pulseLength = THREE.MathUtils.lerp(0.5, 1.8, beamRig.visualRate);
            beamRig.baseBeamOpacity = THREE.MathUtils.lerp(0.12, 0.55, beamRig.visualRate);
        }

        function getConnectionId(siteKey, dishName, spacecraft) {
            return `${siteKey}|${dishName}|${spacecraft}`;
        }

        function formatRtlt(rtltSeconds) {
            return Number.isFinite(rtltSeconds) && rtltSeconds > 0
                ? `${rtltSeconds.toLocaleString()} s (${formatDurationParts(rtltSeconds)})`
                : "Unavailable";
        }

        function formatDurationParts(totalSeconds) {
            if (!Number.isFinite(totalSeconds) || totalSeconds <= 0) {
                return "Unavailable";
            }

            let remainingSeconds = Math.round(totalSeconds);
            const days = Math.floor(remainingSeconds / 86400);
            remainingSeconds -= days * 86400;
            const hours = Math.floor(remainingSeconds / 3600);
            remainingSeconds -= hours * 3600;
            const minutes = Math.floor(remainingSeconds / 60);
            remainingSeconds -= minutes * 60;
            const seconds = remainingSeconds;

            const parts = [];
            if (days > 0) parts.push(`${days}d`);
            if (hours > 0 || days > 0) parts.push(`${hours}h`);
            if (minutes > 0 || hours > 0 || days > 0) parts.push(`${minutes}m`);
            parts.push(`${seconds}s`);

            return parts.join(" ");
        }

        function formatDistanceKm(rtltSeconds) {
            if (!Number.isFinite(rtltSeconds) || rtltSeconds <= 0) {
                return "Unavailable";
            }
            const oneWaySeconds = rtltSeconds / 2;
            const km = oneWaySeconds * 299792.458;
            return `${Math.round(km).toLocaleString()} km`;
        }

        function formatRtltFromDistanceKm(distanceKm) {
            if (!Number.isFinite(distanceKm) || distanceKm <= 0) {
                return "Unavailable";
            }
            const seconds = (distanceKm * 2) / SPEED_OF_LIGHT_KM_S;
            return `${Math.round(seconds).toLocaleString()} s (${formatDurationParts(seconds)})`;
        }

        function setBeamRigVisualState(beamRig, isSelected, hasSelection) {
            const beamOpacity = isSelected ? 0.98 : hasSelection ? Math.max(0.14, beamRig.baseBeamOpacity * 0.55) : beamRig.baseBeamOpacity;
            const beamColor = isSelected ? 0xffffff : beamRig.color;
            beamRig.emphasisScale = isSelected ? 1.8 : 1.35;
            beamRig.beam.material.opacity = beamOpacity;
            beamRig.beam.material.color.setHex(beamColor);

            for (const pulse of pulses) {
                if (pulse.beamRig !== beamRig) continue;
                pulse.mesh.material.color.setHex(isSelected ? 0xffffff : 0xe8ffff);
            }
        }

        function updateBeamThickness() {
            const referenceDistance = DEFAULT_CAMERA_POSITION.distanceTo(DEFAULT_CAMERA_TARGET);
            connectionMap.forEach(beamRig => {
                beamRig.beam.getWorldPosition(tempBeamWorldPos);
                const distance = camera.position.distanceTo(tempBeamWorldPos);
                const screenScale = THREE.MathUtils.clamp(distance / referenceDistance, 1, 60);
                const thicknessScale = beamRig.emphasisScale * screenScale;
                beamRig.beam.scale.set(thicknessScale, thicknessScale, 1);
                beamRig.beamPicker.scale.set(Math.max(2.5, thicknessScale * 1.8), Math.max(2.5, thicknessScale * 1.8), 1);
            });
            for (const pulse of pulses) {
                pulse.mesh.getWorldPosition(tempBeamWorldPos);
                const distance = camera.position.distanceTo(tempBeamWorldPos);
                const screenScale = THREE.MathUtils.clamp(distance / referenceDistance, 1, 60);
                const pulseThicknessScale = Math.max(0.78, Math.min(2.2, pulse.beamRig.emphasisScale * Math.pow(screenScale, 0.7) * 0.58));
                pulse.mesh.scale.set(pulseThicknessScale, 1, pulseThicknessScale);
            }
        }

        function updateSelectedBeamLabel() {
            if (!selectedBeamLabel || !selectedConnectionId) {
                return;
            }
            const beamRig = connectionMap.get(selectedConnectionId);
            if (!beamRig) {
                selectedBeamLabel.visible = false;
                return;
            }

            beamRig.elevationPivot.localToWorld(tempBeamLabelPos.set(0, 0, BEAM_LEN * 0.42));
            const distance = camera.position.distanceTo(tempBeamLabelPos);
            const fovFactor = Math.tan(THREE.MathUtils.degToRad(camera.fov * 0.5));
            const worldScale = distance * fovFactor * 0.032;
            selectedBeamLabel.scale.set(
                selectedBeamLabel.userData.baseScale.x * worldScale,
                selectedBeamLabel.userData.baseScale.y * worldScale,
                1
            );
            tempBeamLabelOffset.copy(camera.up).normalize().multiplyScalar(selectedBeamLabel.scale.y * 0.2);
            selectedBeamLabel.position.copy(tempBeamLabelPos).add(tempBeamLabelOffset);
            selectedBeamLabel.visible = true;
        }

        function refreshSelectionStyles() {
            const hasSelection = Boolean(selectedConnectionId && connectionMap.has(selectedConnectionId));
            connectionMap.forEach((beamRig, connectionId) => {
                setBeamRigVisualState(beamRig, hasSelection && connectionId === selectedConnectionId, hasSelection);
            });
            if (selectedBeamLabel) {
                scene.remove(selectedBeamLabel);
                selectedBeamLabel.material.map.dispose();
                selectedBeamLabel.material.dispose();
                selectedBeamLabel = null;
            }
            if (hasSelection) {
                const beamRig = connectionMap.get(selectedConnectionId);
                const labelText = beamRig?.metadata?.fullName || beamRig?.metadata?.spacecraft;
                if (labelText) {
                    selectedBeamLabel = createBeamLabelSprite(labelText);
                    scene.add(selectedBeamLabel);

            renderConnectionList();
            renderDetails();
            updateSitePopup();

        function placePopupNearWorldPoint(popupEl, worldPosition, screenOffsetX = 18, screenOffsetY = -12) {
            tempPopupScreenPos.copy(worldPosition).project(camera);
            const screenX = (tempPopupScreenPos.x * 0.5 + 0.5) * window.innerWidth;
            const screenY = (-tempPopupScreenPos.y * 0.5 + 0.5) * window.innerHeight;
            const clampedX = Math.min(
                Math.max(12, screenX + screenOffsetX),
                window.innerWidth - popupEl.offsetWidth - 12
            );
            const clampedY = Math.min(
                Math.max(12, screenY + screenOffsetY),
                window.innerHeight - popupEl.offsetHeight - 12
            );
            popupEl.style.left = `${clampedX}px`;
            popupEl.style.top = `${clampedY}px`;
        }

        function getAuditCacheKey(row) {
            return `${row.siteKey}|${row.spacecraftId}|${row.timeUtc}`;
        }

        function requestAuditIfNeeded(row) {
            if (!row.spacecraftId || !row.timeUtc) {
                return {
                    status: 'unavailable',
                    message: 'No spacecraft ID or timestamp was available from the DSN feed for this connection.'
                };
            }

            const auditKey = getAuditCacheKey(row);
            const existing = auditStateByConnectionId.get(row.id);
            if (existing?.auditKey === auditKey) {
                return existing;
            }

            const loadingState = existing?.payload
                ? { status: 'refreshing', auditKey, payload: existing.payload }
                : { status: 'loading', auditKey };
            auditStateByConnectionId.set(row.id, loadingState);

            const params = new URLSearchParams({
                spacecraft_id: row.spacecraftId,
                spacecraft_code: row.spacecraft,
                site: row.siteKey,
                time_utc: row.timeUtc,
                dsn_az: String(row.az),
                dsn_el: String(row.el)
            });

            fetch(`${AUDIT_URL}?${params.toString()}`)
                .then(res => {
                    if (!res.ok) {
                        throw new Error(`HTTP ${res.status}`);
                    }
                    return res.json();
                })
                .then(payload => {
                    if (auditStateByConnectionId.get(row.id)?.auditKey !== auditKey) {
                        return;
                    }
                    auditStateByConnectionId.set(row.id, { status: 'ready', auditKey, payload });
                    if (row.id === selectedConnectionId) {
                        renderDetails();
                    }
                })
                .catch(error => {
                    if (auditStateByConnectionId.get(row.id)?.auditKey !== auditKey) {
                        return;
                    }
                    auditStateByConnectionId.set(row.id, {
                        status: 'error',
                        auditKey,
                        message: error.message || 'Audit request failed.'
                    });
                    if (row.id === selectedConnectionId) {
                        renderDetails();
                    }
                });

            return loadingState;
        }

        function describeAuditAgreement(totalOffsetDeg) {
            if (!Number.isFinite(totalOffsetDeg)) {
                return 'No audit comparison available yet.';
            }
            if (totalOffsetDeg < 1) {
                return 'The DSN line and the JPL Horizons sky position are essentially on top of each other.';
            }
            if (totalOffsetDeg < 3) {
                return 'The DSN line is very close to the Horizons sky position, with only a small offset.';
            }
            if (totalOffsetDeg < 8) {
                return 'The DSN line is in the same patch of sky as Horizons, but the offset is large enough to notice.';
            }
            return 'The DSN line and the Horizons sky position are separated enough that this is worth a closer look.';
        }

        function describeAuditOffset(deltaAzDeg, deltaElDeg) {
            const clockwise = deltaAzDeg >= 0 ? 'clockwise' : 'counterclockwise';
            const vertical = deltaElDeg >= 0 ? 'higher' : 'lower';
            return `Compared with Horizons, the DSN beam is ${Math.abs(deltaAzDeg).toFixed(1)} deg ${clockwise} in azimuth and ${Math.abs(deltaElDeg).toFixed(1)} deg ${vertical} in elevation.`;
        }

        function renderAuditBlock(row, auditState) {
            if (!auditState || auditState.status === 'loading') {
                return `
                    <div style="margin-top:12px; padding-top:12px; border-top:1px solid rgba(255,255,255,0.18);">
                        <div class="detail-title" style="font-size:16px;">Audit Against JPL Horizons</div>
                        <div>Checking the same spacecraft from the same site and timestamp...</div>
                    </div>
                `;
            }

            if (auditState.status === 'error' || auditState.status === 'unavailable') {
                return `
                    <div style="margin-top:12px; padding-top:12px; border-top:1px solid rgba(255,255,255,0.18);">
                        <div class="detail-title" style="font-size:16px;">Audit Against JPL Horizons</div>
                        <div>${auditState.message || 'Audit data is unavailable for this connection.'}</div>
                    </div>
                `;
            }

            const audit = auditState.payload;
            const deltaAz = audit.delta.azimuth_deg;
            const deltaEl = audit.delta.elevation_deg;
            const totalOffset = audit.delta.total_offset_deg;
            const refreshNote = auditState.status === 'refreshing'
                ? `<div style="margin-top:6px; color:#bcd;">Refreshing audit with the latest DSN timestamp...</div>`
                : '';
            return `
                <div style="margin-top:12px; padding-top:12px; border-top:1px solid rgba(255,255,255,0.18);">
                    <div class="detail-title" style="font-size:16px;">Audit Against JPL Horizons</div>
                    <div><span class="detail-label">Horizons target:</span> ${audit.horizons.target_name || row.fullName}</div>
                    <div><span class="detail-label">Audit lookup:</span> ${audit.audit_target}</div>
                    <div><span class="detail-label">Horizons azimuth:</span> ${audit.horizons.azimuth_deg.toFixed(1)} deg</div>
                    <div><span class="detail-label">Horizons elevation:</span> ${audit.horizons.elevation_deg.toFixed(1)} deg</div>
                    <div><span class="detail-label">Sky separation:</span> ${totalOffset.toFixed(2)} deg</div>
                    <div><span class="detail-label">Interpretation:</span> ${describeAuditAgreement(totalOffset)}</div>

        function updatePointerFromEvent(event) {
            const rect = renderer.domElement.getBoundingClientRect();

            pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
        }

        function pickSceneAtPointer() {
            raycaster.setFromCamera(pointer, camera);

            const bodyPickers = [];
            ephemerisMarkers.forEach(marker => {
                if (marker.picker) {
                    bodyPickers.push(marker.picker);
                }
            });
            const bodyIntersections = raycaster.intersectObjects(bodyPickers, false);
            if (bodyIntersections.length > 0) {
                const bodyKey = bodyIntersections[0].object.userData.bodyKey;
                selectedSiteKey = null;
                selectedBodyKey = selectedBodyKey === bodyKey ? null : bodyKey;
                updateSiteSelection();
                updateBodyPopup();
                return true;
            }

            const sitePickers = Object.values(dishGroups).map(siteGroup => siteGroup.picker).filter(Boolean);
            const siteIntersections = raycaster.intersectObjects(sitePickers, false);
            if (siteIntersections.length > 0) {
                const siteKey = siteIntersections[0].object.userData.siteKey;
                selectedBodyKey = null;
                selectedSiteKey = selectedSiteKey === siteKey ? null : siteKey;
                updateBodyPopup();
                updateSiteSelection();
                return true;
            }

            const beams = [];
            connectionMap.forEach(beamRig => {
                beams.push(beamRig.beamPicker);
            });
            const beamIntersections = raycaster.intersectObjects(beams, false);
            if (beamIntersections.length > 0) {
                const beamRig = beamIntersections[0].object.userData.beamRig;
                if (!beamRig?.connectionId) {
                    return false;
                }
                selectedConnectionId = beamRig.connectionId;
                refreshSelectionStyles();
                return true;
            }

            if (selectedBodyKey || selectedSiteKey) {
                selectedBodyKey = null;
                selectedSiteKey = null;
                updateBodyPopup();
                updateSiteSelection();
                return true;
            }

            return false;
        }

        function eciToSceneVector(raw) {
            const vector = new THREE.Vector3(-raw.y, raw.z, -raw.x);
            return vector.applyAxisAngle(new THREE.Vector3(0, 1, 0), EARTH_TEXTURE_ALIGNMENT);
        }

        function equatorialToSceneVector(raDegrees, decDegrees, radius) {
            const raRad = THREE.MathUtils.degToRad(raDegrees);
            const decRad = THREE.MathUtils.degToRad(decDegrees);
            const x = radius * Math.cos(decRad) * Math.cos(raRad);
            const y = radius * Math.cos(decRad) * Math.sin(raRad);
            const z = radius * Math.sin(decRad);
            return eciToSceneVector({ x, y, z });
        }

        function seededRandom(seed) {
            let t = seed >>> 0;
            return () => {
                t += 0x6D2B79F5;
                let r = Math.imul(t ^ (t >>> 15), t | 1);
                r ^= r + Math.imul(r ^ (r >>> 7), r | 61);
                return ((r ^ (r >>> 14)) >>> 0) / 4294967296;
            };
        }

        function createStarfield() {
            const positions = [];
            const colors = [];

            HIPPARCOS_BRIGHT_STARS.forEach(star => {
                const pos = equatorialToSceneVector(star.ra, star.dec, STARFIELD_RADIUS);
                positions.push(pos.x, pos.y, pos.z);

                const color = new THREE.Color(star.color);
                const brightness = THREE.MathUtils.clamp(
                    Math.pow(10, -0.4 * (star.mag + 1.46)) * 1.2,
                    0.18,
                    1
                );
                colors.push(color.r * brightness, color.g * brightness, color.b * brightness);
            });

            const rand = seededRandom(1977);
            for (let i = 0; i < 1800; i++) {
                const u = rand();
                const v = rand();
                const theta = 2 * Math.PI * u;
                const phi = Math.acos(2 * v - 1);
                const x = STARFIELD_RADIUS * Math.sin(phi) * Math.cos(theta);
                const y = STARFIELD_RADIUS * Math.sin(phi) * Math.sin(theta);
                const z = STARFIELD_RADIUS * Math.cos(phi);
                const pos = eciToSceneVector({ x, y, z });
                positions.push(pos.x, pos.y, pos.z);

                const tint = rand();
                const faintMag = THREE.MathUtils.lerp(3.2, 6.4, Math.pow(rand(), 0.65));
                const brightness = THREE.MathUtils.clamp(
                    Math.pow(10, -0.4 * (faintMag - 2.0)) * 0.65,
                    0.035,
                    0.22
                );
                const color = new THREE.Color().setRGB(
                    THREE.MathUtils.lerp(0.72, 1.0, tint) * brightness,
                    THREE.MathUtils.lerp(0.76, 1.0, tint) * brightness,
                    THREE.MathUtils.lerp(0.82, 1.0, tint) * brightness
                );
                colors.push(color.r, color.g, color.b);
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            const material = new THREE.PointsMaterial({
                size: 2.6,
                sizeAttenuation: false,
                vertexColors: true,
                transparent: true,
                opacity: 1,
                blending: THREE.AdditiveBlending,
                depthTest: true,
                depthWrite: false
            });

            const points = new THREE.Points(geometry, material);
            starfieldGroup.add(points);
            starfieldGroup.userData.pointsMaterial = material;
        }

        function createConstellations() {
            const starMap = new Map(HIPPARCOS_BRIGHT_STARS.map(star => [star.name, star]));
            const positions = [];

            CONSTELLATION_SEGMENTS.forEach(([a, b]) => {
                const starA = starMap.get(a);
                const starB = starMap.get(b);
                if (!starA || !starB) return;
                const posA = equatorialToSceneVector(starA.ra, starA.dec, CELESTIAL_SPHERE_RADIUS);
                const posB = equatorialToSceneVector(starB.ra, starB.dec, CELESTIAL_SPHERE_RADIUS);
                positions.push(posA.x, posA.y, posA.z, posB.x, posB.y, posB.z);
            });

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            const material = new THREE.LineBasicMaterial({
                color: 0x7fb8ff,
                transparent: true,
                opacity: 0.32,
                depthTest: true,
                depthWrite: false
            });
            const lines = new THREE.LineSegments(geometry, material);
            constellationGroup.add(lines);

            CONSTELLATION_LABELS.forEach(labelInfo => {
                const sprite = createConstellationLabelSprite(labelInfo.name);
                const position = equatorialToSceneVector(labelInfo.ra, labelInfo.dec, CELESTIAL_SPHERE_RADIUS - 6);

        function getJulianDate(date) {
            return (date.getTime() / 86400000) + 2440587.5;
        }

        function getGreenwichSiderealAngle(date) {
            const jd = getJulianDate(date);
            const t = (jd - 2451545.0) / 36525.0;
            const gmstDegrees =
                280.46061837 +
                360.98564736629 * (jd - 2451545.0) +
                0.000387933 * t * t -
                (t * t * t) / 38710000.0;
            return THREE.MathUtils.degToRad(THREE.MathUtils.euclideanModulo(gmstDegrees, 360));
        }

            let north = worldNorth.clone().sub(up.clone().multiplyScalar(worldNorth.dot(up)));
            if (north.lengthSq() < 1e-6) {
                north = new THREE.Vector3(0, 0, 1);
            } else {
                north.normalize();
            }
            const west = new THREE.Vector3().crossVectors(up, north).normalize();

            const group = new THREE.Group();
            group.position.copy(pos);
            group.setRotationFromMatrix(new THREE.Matrix4().makeBasis(west, up, north));

        async function updateDSN() {
            try {
                const res = await fetch(DATA_URL);
                if (!res.ok) {
                    throw new Error(`HTTP ${res.status}`);
                }
                const text = await res.text();
                const xml = new DOMParser().parseFromString(text, "text/xml");
                const parserError = xml.querySelector('parsererror');
                if (parserError) {
                    throw new Error("Invalid XML response");
                }
                
                statusEl.innerText = "CONNECTION SECURE - UPDATING";
                let activeLinks = 0;
                let currentSiteKey = null;
                let currentStationTimeUtc = new Date().toISOString();
                const siteActivityCounts = new Map(Object.keys(SITES).map(siteKey => [siteKey, new Map()]));
                const siteActiveConnectionCounts = new Map(Object.keys(SITES).map(siteKey => [siteKey, 0]));
                connectionRows.length = 0;
                const activeConnectionIds = new Set();
                Object.values(dishGroups).forEach(siteGroup => {
                    siteGroup.beamRigs = [];
                });

                Array.from(xml.documentElement.children).forEach(node => {
                    if (node.tagName === 'station') {
                        currentSiteKey = stationNameToSiteKey[node.getAttribute('name')?.toLowerCase()] || null;
                        const rawTimeUtc = parseInt(node.getAttribute('timeUTC') || '', 10);
                        currentStationTimeUtc = Number.isFinite(rawTimeUtc)
                            ? new Date(rawTimeUtc).toISOString()
                            : new Date().toISOString();
                        return;
                    }

                    if (node.tagName !== 'dish') {
                        return;
                    }

                    const siteKey = getSiteKeyForDish(node, currentSiteKey);
                    const az = parseFloat(node.getAttribute('azimuthAngle') ?? node.getAttribute('azimuth'));
                    const el = parseFloat(node.getAttribute('elevationAngle') ?? node.getAttribute('elevation'));
                    const activity = node.getAttribute('activity') || 'Unspecified activity';
                    if (siteActivityCounts.has(siteKey)) {
                        const countsForSite = siteActivityCounts.get(siteKey);
                        countsForSite.set(activity, (countsForSite.get(activity) || 0) + 1);
                    }

                    if (!dishGroups[siteKey] || Number.isNaN(az) || Number.isNaN(el)) {
                        return;
                    }

                    const downSignals = node.getElementsByTagName('downSignal');
                    const targetNode = node.getElementsByTagName('target')[0];
                    const targetName = targetNode?.getAttribute('name') || "Unknown";
                    const rtltSeconds = parseFloat(targetNode?.getAttribute('rtlt'));
                    const activeDownSignals = Array.from(downSignals).filter(signal => {
                        const dataRate = parseFloat(signal.getAttribute('dataRate'));
                        return signal.getAttribute('active') === 'true' && dataRate > 0;
                    });

                    if (activeDownSignals.length === 0) {
                        return;
                    }

                    const aggregatedConnections = new Map();

                    activeDownSignals.forEach((signal, signalIndex) => {
                        const spacecraft = signal.getAttribute('spacecraft') || node.getAttribute('name');
                        const dataRate = parseFloat(signal.getAttribute('dataRate'));
                        const dishName = node.getAttribute('name') || 'Unknown Dish';
                        const connectionId = getConnectionId(siteKey, dishName, spacecraft);
                        const band = signal.getAttribute('band') || 'Unknown band';
                        const signalType = signal.getAttribute('signalType') || 'signal';
                        const channelLabel = `${band} ${signalType} (${dataRate.toLocaleString()} bps)`;

                        if (!aggregatedConnections.has(connectionId)) {
                            aggregatedConnections.set(connectionId, {
                                connectionId,
                                siteKey,
                                siteLabel: dishGroups[siteKey].site.label || siteKey,
                                dishName,
                                spacecraft,
                                spacecraftId: signal.getAttribute('spacecraftID') || '',
                                targetName,
                                rtltSeconds,
                                az,
                                el,
                                timeUtc: currentStationTimeUtc,
                                totalDataRate: 0,
                                channels: [],
                                signalCount: 0
                            });
                        }

                        const aggregated = aggregatedConnections.get(connectionId);
                        aggregated.totalDataRate += dataRate;
                        aggregated.signalCount += 1;
                        aggregated.channels.push({
                            label: channelLabel,
                            band,
                            signalType,
                            frequency: signal.getAttribute('frequency') || '',
                            dataRate
                        });
                    });

                    aggregatedConnections.forEach(aggregated => {
                        activeConnectionIds.add(aggregated.connectionId);

                        let beamRig = connectionMap.get(aggregated.connectionId);
                        if (!beamRig) {
                            beamRig = createBeamRig(dishGroups[aggregated.siteKey].group, dishGroups[aggregated.siteKey].site.color, aggregated.totalDataRate);
                            connectionMap.set(aggregated.connectionId, beamRig);
                        }

                        updateBeamRigRate(beamRig, aggregated.totalDataRate);
                        beamRig.azimuthPivot.rotation.set(0, THREE.MathUtils.degToRad(-aggregated.az), 0);
                        beamRig.elevationPivot.rotation.set(THREE.MathUtils.degToRad(-aggregated.el), 0, 0);
                        beamRig.connectionId = aggregated.connectionId;
                        beamRig.beam.userData.beamRig = beamRig;
                        beamRig.beamPicker.userData.beamRig = beamRig;

                        const missionInfo = MISSION_INFO[aggregated.spacecraft] || {
                            fullName: aggregated.spacecraft,
                            launchDate: "Unknown",
                            objective: "Mission metadata not yet mapped in this local interactive.",
                            blurb: "This connection is active in the DSN feed, but the spacecraft description has not been added locally yet.",
                            source: ""
                        };

                        const rtltLabel = formatRtlt(aggregated.rtltSeconds);
                        const distanceKmLabel = formatDistanceKm(aggregated.rtltSeconds);
                        const channelSummary = aggregated.signalCount === 1
                            ? aggregated.channels[0].label
                            : `${aggregated.signalCount} active channels: ${aggregated.channels.map(channel => channel.label).join('; ')}`;

                        beamRig.metadata = {
                            ...aggregated,
                            dataRate: aggregated.totalDataRate,
                            rtltLabel,
                            distanceKmLabel,
                            channelSummary,
                            ...missionInfo
                        };
                        dishGroups[aggregated.siteKey].beamRigs.push(beamRig);
                        activeLinks += 1;
                        siteActiveConnectionCounts.set(
                            aggregated.siteKey,
                            (siteActiveConnectionCounts.get(aggregated.siteKey) || 0) + 1
                        );
                        connectionRows.push({
                            id: aggregated.connectionId,
                            siteLabel: aggregated.siteLabel,
                            dishName: aggregated.dishName,
                            spacecraft: aggregated.spacecraft,
                            spacecraftId: aggregated.spacecraftId,
                            fullName: missionInfo.fullName,
                            dataRate: aggregated.totalDataRate,
                            dataRateLabel: `${aggregated.totalDataRate.toLocaleString()} bps`,
                            az: aggregated.az,
                            el: aggregated.el,
                            siteKey: aggregated.siteKey,
                            timeUtc: aggregated.timeUtc,
                            launchDate: missionInfo.launchDate,
                            objective: missionInfo.objective,
                            blurb: missionInfo.blurb,
                            targetName: aggregated.targetName,
                            rtltLabel,
                            distanceKmLabel,
                            channelSummary
                        });
                    });
                });

                connectionMap.forEach((beamRig, connectionId) => {
                    if (activeConnectionIds.has(connectionId)) {
                        return;
                    }
                    beamRig.azimuthPivot.parent?.remove(beamRig.azimuthPivot);
                    for (let i = pulses.length - 1; i >= 0; i--) {
                        if (pulses[i].beamRig !== beamRig) continue;
                        pulses[i].parent.remove(pulses[i].mesh);
                        pulses.splice(i, 1);
                    }
                    connectionMap.delete(connectionId);
                });

                connectionRows.sort((a, b) => b.dataRate - a.dataRate);
                if (selectedConnectionId && !connectionMap.has(selectedConnectionId)) {
                    selectedConnectionId = null;
                }
                if (!selectedConnectionId && connectionRows.length > 0) {
                    selectedConnectionId = connectionRows[0].id;
                }

                statusEl.innerText = activeLinks > 0
                    ? `CONNECTION SECURE - ${activeLinks} ACTIVE LINKS`
                    : "CONNECTION SECURE - NO ACTIVE DOWNLINKS";
                Object.keys(SITES).forEach(siteKey => {
                    siteActivitySummaryBySite.set(
                        siteKey,
                        formatSiteActivitySummary(
                            siteKey,
                            siteActivityCounts.get(siteKey) || new Map(),
                            siteActiveConnectionCounts.get(siteKey) || 0
                        )
                    );
                });
                refreshSelectionStyles();
            } catch (e) {
                console.error(e);
                statusEl.innerText = "CONNECTION LOST. RETRYING...";
                Object.keys(SITES).forEach(siteKey => {
                    siteActivitySummaryBySite.set(
                        siteKey,
                        '<div style="color:#fbb;">Could not fetch the DSN feed from the server proxy. This is usually a network issue or an upstream NASA/JPL outage.</div>'
                    );
                });
                renderConnectionList();
                updateSitePopup();
            }
        }

        function spawnPulse(beamRig) {
            if (!beamRig) {
                return;
            }
            const p = new THREE.Mesh(
                new THREE.CylinderGeometry(beamRig.pulseSize, beamRig.pulseSize, beamRig.pulseLength, 10),
                new THREE.MeshBasicMaterial({color:0xffffff})
            );
            p.rotation.x = Math.PI / 2;
            p.position.set(0,0,BEAM_LEN - beamRig.pulseLength * 0.5);
            beamRig.elevationPivot.add(p);
            pulses.push({mesh:p, parent:beamRig.elevationPivot, speed: beamRig.pulseSpeed, beamRig, length: beamRig.pulseLength});
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            updateEarthOrientation();
            Object.values(dishGroups).forEach(siteGroup => {
                siteGroup.beamRigs.forEach(beamRig => {
                    beamRig.pulseAccumulator += delta;
                    while (beamRig.pulseAccumulator >= beamRig.pulseInterval) {
                        beamRig.pulseAccumulator -= beamRig.pulseInterval;
                        spawnPulse(beamRig);
                    }
                });
            });
            for (let i = pulses.length - 1; i >= 0; i--) {
                const p = pulses[i];
                p.mesh.position.z -= p.speed * delta;
                if (p.mesh.position.z <= -p.length * 0.5) {
                    p.parent.remove(p.mesh);
                    pulses.splice(i, 1);
                }
            }
            controls.target.copy(DEFAULT_CAMERA_TARGET);
            updateBeamThickness();
            updateSelectedBeamLabel();
            updateEphemerisLabelScales();
            controls.update();
            updateAnchoredPopups();
            renderer.render(scene, camera);
        }

        setInterval(updateDSN, 5000);
        updateDSN();
        setInterval(updateEphemeris, 60000);
        updateEphemeris();
        animate();
    </script>
</body>
</html>
